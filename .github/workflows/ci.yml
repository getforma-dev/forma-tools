name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - run: npm run build -w packages/compiler
      - run: npm test --workspaces
      - run: npm run build --workspaces

  e2e:
    runs-on: ubuntu-latest
    needs: test  # Only run E2E if unit tests pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Clone and build FormaJS for E2E fixtures
      - name: Clone FormaJS
        uses: actions/checkout@v4
        with:
          repository: getforma-dev/formajs
          path: formajs-checkout

      - name: Build FormaJS
        run: |
          cd formajs-checkout
          npm ci
          npm run build

      - name: Copy fixtures
        run: |
          cp formajs-checkout/dist/formajs-runtime.global.js e2e/fixtures/
          cp formajs-checkout/dist/formajs.global.js e2e/fixtures/

      # Install forma-tools deps and run E2E
      - run: npm install
      - run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
